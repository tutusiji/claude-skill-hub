services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skill-hub-web
    ports:
      - "7788:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=byd@123456
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
    volumes:
      - skill-hub-data:/app/data
      - skill-hub-uploads:/app/uploads

volumes:
  skill-hub-data:
  skill-hub-uploads:
