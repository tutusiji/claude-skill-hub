services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skill-hub-web
    ports:
      - "7788:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ADMIN_USERNAME=admin
      # ADMIN_PASSWORD 必须通过 .env 或宿主环境变量设置;未设则 docker compose up 失败
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?请在 .env 或环境变量中设置 ADMIN_PASSWORD}
      - DATA_DIR=/app/data
      - UPLOAD_DIR=/app/uploads
    volumes:
      - skill-hub-data:/app/data
      - skill-hub-uploads:/app/uploads

volumes:
  skill-hub-data:
  skill-hub-uploads:
