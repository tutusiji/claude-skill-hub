# Skill Hub — HTTPS (公网环境)
# 适用于 https://joox.cc:7504

server {
    listen              7504 ssl http2;
    listen              [::]:7504 ssl http2;
    server_name         joox.cc;

    ssl_certificate     /etc/nginx/ssl/joox.cc.pem;
    ssl_certificate_key /etc/nginx/ssl/joox.cc.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    error_page 497 =301 https://$host:7504$request_uri;

    client_max_body_size 50m;

    # Git smart HTTP — 匹配 .git 结尾的路径
    location ~ ^/.*\.git(/.*)?$ {
        fastcgi_pass unix:/run/fcgiwrap.socket;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /usr/lib/git-core/git-http-backend;
        fastcgi_param GIT_HTTP_EXPORT_ALL "";
        fastcgi_param GIT_PROJECT_ROOT /opt/skill-hub/repo;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REMOTE_USER $remote_user;
        fastcgi_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
